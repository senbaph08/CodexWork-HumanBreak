<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Codex Rest</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <div class="sun"></div>
    <div class="haze haze-one"></div>
    <div class="haze haze-two"></div>
    <div class="grain"></div>
  </div>

  <main id="restView" class="rest-view">
    <section class="message" aria-labelledby="restTitle">
      <div class="eyebrow">CODEX IS WORKING</div>
      <h1 id="restTitle">Codexが作業しています。</h1>
      <p>完了するまでPCから離れて、<br>ゆっくり休みましょう。</p>
      <div class="elapsed" aria-label="作業経過時間">
        <span class="pulse" aria-hidden="true"></span>
        <span id="elapsed">00:00</span>
      </div>
    </section>

    <aside class="quick-controls" aria-label="音声設定">
      <button id="musicToggle" class="toggle" type="button" aria-pressed="true">
        <span aria-hidden="true">♫</span><span>音楽</span><strong>ON</strong>
      </button>
      <button id="chimeToggle" class="toggle" type="button" aria-pressed="true">
        <span aria-hidden="true">♢</span><span>完了通知音</span><strong>ON</strong>
      </button>
    </aside>

    <section id="detailControls" class="detail-controls" aria-label="詳細設定">
      <label>音楽音量 <input id="musicVolume" type="range" min="0" max="1" step="0.01"></label>
      <label>通知音量 <input id="chimeVolume" type="range" min="0" max="1" step="0.01"></label>
      <button id="closeRest" class="quiet-button" type="button">今回の休憩画面を閉じる</button>
    </section>
  </main>

  <main id="settingsView" class="settings-view" hidden>
    <div class="settings-card">
      <div class="eyebrow">CODEX REST</div>
      <h1>休憩画面の設定</h1>
      <p class="lead">音楽と完了通知はすべてこのMacの中だけで処理されます。</p>

      <section class="settings-section">
        <h2>再生</h2>
        <div class="setting-row"><span>音楽</span><button id="settingsMusicToggle" class="toggle" type="button"></button></div>
        <label class="setting-row"><span>音楽音量</span><input id="settingsMusicVolume" type="range" min="0" max="1" step="0.01"></label>
        <div class="setting-row"><span>完了通知音</span><button id="settingsChimeToggle" class="toggle" type="button"></button></div>
        <label class="setting-row"><span>通知音量</span><input id="settingsChimeVolume" type="range" min="0" max="1" step="0.01"></label>
      </section>

      <section class="settings-section">
        <h2>音源</h2>
        <label class="radio-row"><input type="radio" name="musicSource" value="builtin"> 内蔵オリジナル曲</label>
        <label class="radio-row"><input type="radio" name="musicSource" value="playlist"> 自分のプレイリスト</label>
        <label class="setting-row"><span>再生順</span>
          <select id="playlistOrder"><option value="sequential">順番に再生</option><option value="shuffle">シャッフル</option></select>
        </label>
        <label class="upload-button">音源を追加<input id="trackUpload" type="file" accept="audio/*,.mp3,.m4a,.aac,.wav,.ogg,.flac" multiple hidden></label>
        <div id="uploadStatus" class="status" role="status"></div>
        <ul id="trackList" class="track-list"></ul>
      </section>

      <section class="settings-section reset-section" aria-labelledby="resetHeading">
        <h2 id="resetHeading">タスク状態</h2>
        <p id="taskStateSummary" class="state-summary" aria-live="polite">状態を確認しています…</p>
        <p class="setting-help">
          作業中にCodexのタスクをアーカイブした場合など、休憩画面が終了しないときに使います。
          設定と音源は削除されません。
        </p>
        <button id="resetTaskState" class="danger-button" type="button">状態をリセット</button>
        <div id="resetStatus" class="status" role="status"></div>
      </section>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
