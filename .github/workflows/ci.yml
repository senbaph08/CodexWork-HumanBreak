name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Python tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: JavaScript syntax
        run: node --check codex_rest/web/app.js

      - name: Build macOS app
        run: python build_macos_app.py

      - name: Verify app bundle
        run: |
          plutil -lint "build/Codex Rest.app/Contents/Info.plist"
          codesign --verify --deep --strict --verbose=2 "build/Codex Rest.app"
